    <meta charset="utf-8">
</head>
<body>
    <div style="color:red;font-size:50px;">
        <script language="JavaScript">
            var silnia_bie = 1;
            var n_bie = parseInt(prompt("n = ",""));
            for (var i_bie = 1; i_bie<=n_bie; i_bie++){
                silnia_bie*=i_bie;
            }
            document.write(n_bie + "! = " + silnia_bie.toFixed(0));
        </script>
    </div>
</body>
