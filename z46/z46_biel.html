<html>
   <head>
      <title>Bielecki Z46_JS</title>
   </head>
   <head>
      <meta charset="UTF-8">
   </head>
<body>
<div style="color:red;font-size:42px;">
   Wielkość liter = 42px<br> Ilość pętli = 10<br>
 <script language="JavaScript">
for(i=0;i<=10;i++) {
   document.write(i+" ");
   if(i%2==0){
      document.write("Kuba <br>");
   }
   else{
      document.write("Bielecki <br>");
   }
}
 </script>
</div>
</body>
</html>
