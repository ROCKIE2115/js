<html>
<head>
    <meta charset="utf-8">
    <title> Bielecki Z55_JS </title>
    <script language="JavaScript">
        var a_bie = 8;
        var b_bie = 24;

        for (var j_bie = 1; j_bie <= b_bie; j_bie++) {
            document.write("*");
        }
        document.write("<br>");
        var wiersz_bie = "*";
        for (var j_bie = 1; j_bie <= (b_bie - 2); j_bie++) {
            wiersz_bie = wiersz_bie + "&nbsp;&nbsp;";
        }
        wiersz_bie = wiersz_bie + "*";
        for (var i_bie = 1; i_bie <= (a_bie - 2); i_bie++) {
            document.write(wiersz_bie + "<br>");
        }
        for (var j_bie = 1; j_bie <= b_bie; j_bie++) {
            document.write("*");
        }
        document.write("<br>");
    </script>
</head>

</body>
