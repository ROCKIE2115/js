<!DOCTYPE html>
<html lang="pl-PL">
    <meta charset="UTF-8">
    <title>Bielecki Z40_JS</title>
<body>

    <div style="color:red;font-size:50px;">
    <script language="JavaScript">
        var x=prompt("podaj argument x=","");
        var x_bie=parseFloat(x);
        document.write("wykonał Kuba Bielecki <br>");
        document.write("czytany argument x="+x_bie+"<br>");
        function f_bie(x_bie) {
            if(x_bie>=2) {
                return 9;
            }
            if((x_bie>-2)&&(x_bie<0)) {
                return Math.pow(x_bie+1, 2);
            }
            if((x_bie>=0)&&(x_bie<2)) {
                return Math.pow(x_bie, 3) + 1;
            }
            if (x_bie<-2){
                return 1;
            }
        }
        document.write("f("+x+")="+f_bie(x_bie)+"<br>");
    </script>
    </div>
</body>
</html>
<!-- Bielecki Z40_JS -->
