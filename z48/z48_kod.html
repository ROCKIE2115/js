<html>

<head>
   <title>Bielecki Z48_JS</title>
   <meta charset="UTF-8">
</head>

<body>
   <div style="color:red;font-size:50px;">
      <script language="JavaScript">
         do {
            var liczba1 = prompt("wysokość=", "");
            var h_bie = parseFloat(liczba1);
         }
         while (h_bie <= 0);
         do {
            var liczba1 = prompt("podstawę=", "");
            var a_bie = parseFloat(liczba1);
         }
         while (!(a_bie > 0));
         var Pole = a_bie * h_bie / 2;
         document.write("Pole=" + Pole.toFixed(2) + " cm^2" + "<br>");
      </script>
   </div>
</body>

</html>
